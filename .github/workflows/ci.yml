name: CI
on:
  push:
    branches:
      - main
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make hadolint
        run: make hadolint
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make markdownlint
        run: make markdownlint
  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make build_dev
        run: make build_dev
      - name: Run make mypy
        run: make mypy
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make ruff
        run: make ruff
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make shellcheck
        run: make shellcheck
  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make shfmt
        run: make shfmt
  test:
    name: Test the application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make build
        run: make build
      - name: Run make test
        run: make test
  build:
    name: Build and Push
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    needs: [hadolint, markdownlint, mypy, ruff, shellcheck, shfmt, test]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          build-args: SOURCE_COMMIT=${{ github.sha }}
          platforms: linux/amd64, linux/arm64
          push: true
          tags: ghcr.io/shakiyam/pptx2txt:latest
